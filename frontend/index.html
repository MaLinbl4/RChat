<!DOCTYPE html>
<html lang="ru">
<head>

</head>
<body>
    <div id="app">
        <input type="text" id="username" placeholder="Имя">
        <input type="password" id="key" placeholder="Секретный код">
        
        <div id="chat-window" style="height: 300px; border: 1px solid #ccc; overflow-y: auto;"></div>

        <input type="text" id="msg-input" placeholder="Сообщение...">
        <button onclick="send()">➤</button>
    </div>
